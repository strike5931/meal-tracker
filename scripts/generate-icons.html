<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>產生 PNG Icons</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #111; color: #eee; padding: 24px; max-width: 640px; margin: 0 auto; }
  h1 { font-size: 18px; margin-bottom: 8px; }
  p { color: #999; font-size: 13px; line-height: 1.6; }
  .row { display: flex; flex-wrap: wrap; gap: 16px; margin: 20px 0; }
  .icon-box { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 12px; text-align: center; }
  .icon-box img, .icon-box canvas { display: block; margin: 0 auto 8px; background: #000; border-radius: 8px; }
  button { background: #ff6b35; color: #000; border: none; border-radius: 6px; padding: 6px 10px; font-weight: 700; font-family: inherit; cursor: pointer; font-size: 12px; }
  .size { font-size: 11px; color: #888; margin-top: 4px; }
  .all { background: #4caf50; color: #000; padding: 10px 18px; font-size: 14px; border-radius: 8px; margin-top: 10px; }
</style>
</head>
<body>
<h1>🎨 產生 App Icons</h1>
<p>此頁會將 <code>../icons/icon.svg</code> 渲染成各尺寸 PNG。<br>
點「下載全部」後把下載的檔案搬到 <code>icons/</code> 目錄即可。</p>

<button class="all" onclick="downloadAll()">⬇️ 下載全部 PNG</button>

<div class="row" id="grid"></div>

<script>
var SIZES = [
  { name: 'apple-touch-icon.png', size: 180, maskable: false },
  { name: 'icon-192.png',         size: 192, maskable: false },
  { name: 'icon-512.png',         size: 512, maskable: false },
  { name: 'icon-512-maskable.png',size: 512, maskable: true  },
  { name: 'icon-1024.png',        size: 1024,maskable: false }
];

function loadSVG() {
  return fetch('../icons/icon.svg').then(function(r) { return r.text(); });
}

function draw(svgText, size, maskable) {
  var canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  var ctx = canvas.getContext('2d');
  // iOS mask 需要 safe zone: 80%
  var pad = maskable ? size * 0.1 : 0;
  return new Promise(function(resolve) {
    var img = new Image();
    var blob = new Blob([svgText], { type: 'image/svg+xml' });
    var url = URL.createObjectURL(blob);
    img.onload = function() {
      // maskable: 填滿背景
      if (maskable) { ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,size,size); }
      ctx.drawImage(img, pad, pad, size - pad*2, size - pad*2);
      URL.revokeObjectURL(url);
      resolve(canvas);
    };
    img.src = url;
  });
}

var canvases = {};

function render() {
  loadSVG().then(function(svg) {
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    SIZES.forEach(function(s) {
      draw(svg, s.size, s.maskable).then(function(c) {
        canvases[s.name] = c;
        var box = document.createElement('div');
        box.className = 'icon-box';
        var preview = document.createElement('canvas');
        preview.width = 96; preview.height = 96;
        preview.getContext('2d').drawImage(c, 0, 0, 96, 96);
        box.appendChild(preview);
        var label = document.createElement('div');
        label.className = 'size';
        label.textContent = s.name + ' (' + s.size + 'px)';
        box.appendChild(label);
        var btn = document.createElement('button');
        btn.textContent = '下載';
        btn.onclick = function() { downloadOne(s.name); };
        box.appendChild(btn);
        grid.appendChild(box);
      });
    });
  });
}

function downloadOne(name) {
  var c = canvases[name]; if (!c) return;
  c.toBlob(function(blob) {
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setTimeout(function() { URL.revokeObjectURL(a.href); }, 1000);
  }, 'image/png');
}

function downloadAll() {
  SIZES.forEach(function(s, i) {
    setTimeout(function() { downloadOne(s.name); }, i * 250);
  });
}

render();
</script>
</body>
</html>
